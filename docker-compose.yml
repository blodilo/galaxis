services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-galaxis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-galaxis_dev}
      POSTGRES_DB: ${POSTGRES_DB:-galaxis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-galaxis} -d ${POSTGRES_DB:-galaxis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"   # Go-Services
      - "4223:4223"   # Browser WebSocket (nats.ws)
      - "8222:8222"   # HTTP Monitoring
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data/nats
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  nats_data:
