# NATS Server Konfiguration — Galaxis (Entwicklung)
# Produktion: TLS aktivieren, authorization auf NKey/JWT umstellen

port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/nats"
  max_memory_store: 256MB
  max_file_store: 1GB
}

websocket {
  port: 4223
  no_tls: true   # Dev only — TLS in Produktion Pflicht
  compression: true
}

# Dev: kein Auth erforderlich
# Produktion: authorization-Block mit operator/account/user NKeys ersetzen
