# Galaxis — Produktionsrezepte
# Version: 1.1 · Datum: 2026-03-23
#
# Änderungen gegenüber v1.0:
#   - facility_type ist jetzt output-gut-spezifisch:
#       smelter → steel_mill | titansteel_forge | chrom_alloy_plant | keramik_plant
#       refinery → semiconductor_plant | fuel_processor | reprocessing_plant | coolant_plant
#       bioreaktor → biosynth_lab
#   - Neues Pflichtfeld output_good (muss mit dem einzigen outputs-Key übereinstimmen)
#   - Neues Rezept: steel_chromium (T2 Stahl, Chrom-veredelt)
#   - Assembler-Rezepte: facility-Output-IDs an neue Typnamen angepasst
#
# Prinzip (finalisiert):
#   facility_type bestimmt das Output-Gut — eine Stahlwerk produziert immer Stahl.
#   Rezepte modellieren nur noch Tech-Level und Effizienz-Varianten
#   (gleicher Output, veränderte Inputs und/oder bessere Ausbeute).
#
# Konvention:
#   - id: snake_case, eindeutig über alle Rezepte
#   - output_good: good_id des Outputs (muss mit outputs-Key übereinstimmen)
#   - inputs/outputs: good_id → Menge in Einheiten (E)
#   - base_efficiency: η bei Level 1, ohne Forschungsbonus (0.0–1.0)
#   - ticks: Produktionsdauer in Strategie-Ticks
#
# Stufen (product tiers — was das Gut IST, nicht wie es produziert wird):
#   tier 1 = Rohstoffverarbeitung (nur in-situ, kein Rezept nötig)
#   tier 2 = Halbzeug (Schmelze, Raffinerie, Bio, Treibstoff)
#   tier 3 = Komponenten (Präzisionsfabrik, nur orbital)
#   tier 4 = Endprodukte (Werft, Assembler)


# ═══════════════════════════════════════════════════════════════════
# STUFE 2 — HALBZEUG
# Metalle (steel_mill, titansteel_forge, chrom_alloy_plant, keramik_plant)
# ═══════════════════════════════════════════════════════════════════
recipes:

  # ── Stahlwerk (steel_mill) ────────────────────────────────────────
  # Produziert: steel
  # T1: Basis — reines Eisenerz
  - id: steel_basic
    name: "Stahl (Basis)"
    facility_type: steel_mill
    output_good: steel
    tier: 2
    ticks: 1
    base_efficiency: 0.90
    # [BALANCING] Basis-Stahlproduktion. 5 E Eisenerz → 5 E Stahl.
    inputs:
      iron_ore: 5
    outputs:
      steel: 5

  # T2: Chrom-veredelt — weniger Eisenerz-Verbrauch, gleiche Ausbeute
  - id: steel_chromium
    name: "Stahl (Chrom-veredelt)"
    facility_type: steel_mill
    output_good: steel
    tier: 2
    ticks: 1
    base_efficiency: 0.93
    # [BALANCING] Verbesserte Variante: Chromzusatz erhöht Festigkeit und reduziert
    # Eisenerz-Verbrauch. Gleiche Ausbeute bei weniger Hauptinput = Tech-Upgrade.
    inputs:
      iron_ore: 4
      chrom: 1
    outputs:
      steel: 5

  # ── Titanstahl-Schmiede (titansteel_forge) ────────────────────────
  # Produziert: titansteel
  - id: titansteel_basic
    name: "Titanstahl (Basis)"
    facility_type: titansteel_forge
    output_good: titansteel
    tier: 2
    ticks: 1
    base_efficiency: 0.90
    # [BALANCING] Kernmaterial für Anlagenbau. 3 E Eisenerz + 1 E Titan → 3 E Titanstahl.
    inputs:
      iron_ore: 3
      titan_ore: 1
    outputs:
      titansteel: 3

  # ── Chrom-Legierungswerk (chrom_alloy_plant) ──────────────────────
  # Produziert: chrom_alloy
  - id: chrom_alloy_basic
    name: "Chrom-Legierung (Basis)"
    facility_type: chrom_alloy_plant
    output_good: chrom_alloy
    tier: 2
    ticks: 1
    base_efficiency: 0.88
    inputs:
      chrom: 2
      iron_ore: 1
    outputs:
      chrom_alloy: 2

  # ── Keramikwerk (keramik_plant) ───────────────────────────────────
  # Produziert: keramik_komposit
  - id: keramik_komposit_basic
    name: "Keramik-Komposit (Basis)"
    facility_type: keramik_plant
    output_good: keramik_komposit
    tier: 2
    ticks: 2
    base_efficiency: 0.85
    inputs:
      silicates: 2
      chrom: 1
    outputs:
      keramik_komposit: 2


# ═══════════════════════════════════════════════════════════════════
# STUFE 2 — HALBZEUG
# Chemie / Elektronik / Bio
# (semiconductor_plant, fuel_processor, reprocessing_plant, coolant_plant, biosynth_lab)
# ═══════════════════════════════════════════════════════════════════

  # ── Halbleiterwerk (semiconductor_plant) ─────────────────────────
  # Produziert: semiconductor_wafer
  - id: semiconductor_wafer_basic
    name: "Halbleiter-Wafer (Basis)"
    facility_type: semiconductor_plant
    output_good: semiconductor_wafer
    tier: 2
    ticks: 3
    base_efficiency: 0.85
    # [BALANCING] Schlüsselgut für Klasse-III-Produktion. Engpass-Ressource.
    # Seltene Erden sind Klasse II → Anlage braucht Sealed-Lager.
    inputs:
      silicates: 1
      rare_earths: 1
    outputs:
      semiconductor_wafer: 2

  # ── Treibstoffanlage (fuel_processor) ────────────────────────────
  # Produziert: fusion_fuel
  - id: fusion_fuel_basic
    name: "Fusionstreibstoff (Basis)"
    facility_type: fuel_processor
    output_good: fusion_fuel
    tier: 2
    ticks: 1
    base_efficiency: 0.92
    inputs:
      helium3: 2
      hydrogen: 3
    outputs:
      fusion_fuel: 4

  # ── Wiederaufbereitungsanlage (reprocessing_plant) ────────────────
  # Produziert: fissile_material
  - id: fissile_material_basic
    name: "Spaltmaterial (Basis)"
    facility_type: reprocessing_plant
    output_good: fissile_material
    tier: 2
    ticks: 4
    base_efficiency: 0.80
    # [BALANCING] Klasse IV — Anlage benötigt Segregated-Magazin.
    # Detonationsrisiko bei Falschlagerung (game-params: sensitivity.class_IV).
    inputs:
      uranium_raw: 2
    outputs:
      fissile_material: 1

  # ── Kühlmittelwerk (coolant_plant) ────────────────────────────────
  # Produziert: coolant
  - id: coolant_basic
    name: "Kühlmittel (Basis)"
    facility_type: coolant_plant
    output_good: coolant
    tier: 2
    ticks: 1
    base_efficiency: 0.90
    inputs:
      water_ice: 3
    outputs:
      coolant: 2

  # ── Biosynth-Labor (biosynth_lab) ─────────────────────────────────
  # Produziert: biosynth_base
  - id: biosynth_base_basic
    name: "Biosynth-Grundstoff (Basis)"
    facility_type: biosynth_lab
    output_good: biosynth_base
    tier: 2
    ticks: 2
    base_efficiency: 0.82
    inputs:
      organics: 2
      water_ice: 1
    outputs:
      biosynth_base: 2


