    efficiency: 0.85

  # ── Construction (build) recipes ──────────────────────────────────────────────
  # factory_type: construction — processed by BuildTickHandler (no physical facility needed).
  # product_id encodes facility type and, for mines, the deposit good.
  # Inputs sourced from BUILD_COSTS (game-params). Ticks = build duration.

