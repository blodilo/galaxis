recipes:
  # ── Mine recipes ─────────────────────────────────────────────────────────────
  # geological_input: the good_id drawn from planet_deposits each tick.
  # base_yield / efficiency: applied via accumulator (floor(acc += rate * η)).
  # Output rate per tick = MineParams.RateForLevel(facility.level).
  # inputs: [] — no goods-storage inputs; slot limit enforced by scheduler.

  - recipe_id: mine_iron_ore
    product_id: iron_ore
    factory_type: mine
    geological_input: iron_ore
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 1.0

  - recipe_id: mine_silicates
    product_id: silicates
    factory_type: mine
    geological_input: silicates
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 1.0

  - recipe_id: mine_titan
    product_id: titan
    factory_type: mine
    geological_input: titan
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 1.0

  - recipe_id: mine_rare_earths
    product_id: rare_earths
    factory_type: mine
    geological_input: rare_earths
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 0.90  # [BALANCING] Seltene Erden: etwas Verlust beim Abbau

  - recipe_id: mine_he3
    product_id: he3
    factory_type: mine
    geological_input: he3
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 0.95  # [BALANCING] Gas-Harvesting: leichte Verluste

  - recipe_id: mine_hydrogen
    product_id: hydrogen
    factory_type: mine
    geological_input: hydrogen
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 0.98

  # ── Smelter recipes ───────────────────────────────────────────────────────────

  - recipe_id: smelter_steel
    product_id: steel
    factory_type: smelter
    inputs:
      - item_id: iron_ore
        amount: 5.0
    base_yield: 5.0
    ticks: 1
    efficiency: 0.90

  - recipe_id: smelter_titansteel
    product_id: titansteel
    factory_type: smelter
    inputs:
      - item_id: iron_ore
        amount: 3.0
      - item_id: titan
        amount: 1.0
    base_yield: 3.0
    ticks: 1
    efficiency: 0.90

  - recipe_id: refinery_wafer
    product_id: semiconductor_wafer
    factory_type: refinery
    inputs:
      - item_id: silicates
        amount: 1.0
      - item_id: rare_earths
        amount: 1.0
    base_yield: 2.0
    ticks: 3
    efficiency: 0.85

  - recipe_id: refinery_fuelstoff
    product_id: fusion_fuel
    factory_type: refinery
    inputs:
      - item_id: he3
        amount: 2.0
      - item_id: hydrogen
        amount: 3.0
    base_yield: 4.0
    ticks: 1
    efficiency: 0.92

  - recipe_id: precision_basis
    product_id: base_component
    factory_type: precision_fab
    inputs:
      - item_id: titansteel
        amount: 2.0
      - item_id: semiconductor_wafer
