# ═══════════════════════════════════════════════════════════════════
# DOWNLOAD-ANLEITUNG
# ═══════════════════════════════════════════════════════════════════

download_instructions: |
  1. ESA/Hubble (esahubble.org):
     - Seite aufrufen, unter "Formats" → "Original" oder "Large" TIFF/JPEG herunterladen
     - Bildkennung (z.B. heic0503a) ist stabil auch wenn URL sich ändert

  2. ESO (eso.org):
     - download_url (wenn angegeben) direkt nutzen für TIFF
     - Alternativ: Seite aufrufen → "Full Resolution" klicken

  3. STScI / HubbleSite:
     - Neue Archiv-URL: https://hubblesite.org/image-gallery
     - source_id als Suchbegriff verwenden

  4. Dateien ablegen unter: assets/morphology/<file>
  5. enabled: true setzen nach erfolgreichem Download und Sichtprüfung


