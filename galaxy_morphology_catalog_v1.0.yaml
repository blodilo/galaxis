download_instructions: "1. ESA/Hubble (esahubble.org):\n   - Seite aufrufen, unter\
  \ \"Formats\" → \"Original\" oder \"Large\" TIFF/JPEG herunterladen\n   - Bildkennung\
  \ (z.B. heic0503a) ist stabil auch wenn URL sich ändert\n\n2. ESO (eso.org):\n \
  \  - download_url (wenn angegeben) direkt nutzen für TIFF\n   - Alternativ: Seite\
  \ aufrufen → \"Full Resolution\" klicken\n\n3. STScI / HubbleSite:\n   - Neue Archiv-URL:\
  \ https://hubblesite.org/image-gallery\n   - source_id als Suchbegriff verwenden\n\
  \n4. Dateien ablegen unter: assets/morphology/<file>\n5. enabled: true setzen nach\
  \ erfolgreichem Download und Sichtprüfung\n"
