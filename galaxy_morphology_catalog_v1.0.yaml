# Galaxis – Morphologie-Vorlagen-Katalog
# Version: 1.0 · Datum: 2026-03-14
#
# Zweck: Katalog realer Galaxienfotos als 2D-Dichtevorlagen für den Galaxiengenerator.
#        Der Generator liest das Bild als Graustufenbild, normalisiert die Pixelwerte
#        auf eine Dichtefunktion und überlagert sie mit der analytischen Basisverteilung.
#
# Erweiterbarkeit:
#   - Neue Einträge unter `templates:` ergänzen; `enabled: true` schaltet sie frei.
#   - Bilder liegen unter `assets/morphology/<file>`.
#   - Morphologie-ID wird in game-params und galaxy-gen als `--morphology <id>` genutzt.
#
# Lizenzhinweis:
#   ESA/Hubble:  Freie Nutzung für Bildung und nicht-kommerzielle Zwecke.
#                Credit-Pflicht: "ESA/Hubble & NASA" (+ ggf. spezifische Autoren)
#   STScI/NASA:  Public domain (alle NASA-Bilder)
#   ESO:         CC-BY-4.0 (kommerzielle Nutzung erlaubt, mit Credit)
#   NOIRLab:     CC-BY-4.0 (NSF/NOIRLab/AURA, kommerzielle Nutzung erlaubt)
#
# URL-Hinweis:
#   Alle URLs basieren auf Archivkenntnissen (Stand Aug. 2025).
#   ESA/Hubble und STScI restrukturieren ihr Archiv gelegentlich.
#   Falls eine URL nicht funktioniert: Bildkennung (z.B. heic0503a) direkt auf
#   esahubble.org oder hubblesite.org suchen – Kennungen sind stabil.

# ═══════════════════════════════════════════════════════════════════
# VORHANDENE BILDER (bereits im Verzeichnis)
# ═══════════════════════════════════════════════════════════════════

templates:

  # ─────────────────────────────────────────────────────────────────
  - id: m101_sc
    enabled: false              # Auflösung zu niedrig (700×547 px) – hochauflösendes Bild nachladen
    status: low_resolution
    name: "M101 – Pinwheel Galaxy"
    designation: "NGC 5457"
    hubble_type: Sc
    hubble_description: "Lose Spiralgalaxie, kleiner Bulge, stark ausgeprägte offene Arme"
    file: "heic0602a.jpg"
    asset_path: "assets/morphology/heic0602a.jpg"
    source_id: "heic0602a"
    source_archive: "ESA/Hubble"
    source_url: "https://esahubble.org/images/heic0602a/"
    license: "ESA/Hubble – freie Nutzung, Credit erforderlich"
    credit: "ESA/Hubble & NASA"
    resolution_px: [700, 547]   # Gemessen 2026-03-14 – zu niedrig für Dichtetemplate; mind. 2000 px nötig
    orientation: "face-on"
    quality_notes: >
      Kanonisches Sc-Beispiel. Sehr klare, lose Spiralarme mit sichtbaren
      H-II-Regionen (blaue Knoten). Kein Balken. Starke Asymmetrie der Arme
      ist charakteristisch für Sc – gut für natürlich wirkende Galaxien.
      ACHTUNG: Vorliegendes Bild nur 700×547 px – nicht nutzbar als Dichtetemplate.
      Hochauflösendes Original von esahubble.org/images/heic0602a/ nachladen (→ heic0602a_large.jpg).

  # ═══════════════════════════════════════════════════════════════════
  # ZU BESCHAFFENDE BILDER
  # Alle URLs und Kennungen bitte vor dem Download verifizieren.
  # ═══════════════════════════════════════════════════════════════════

