  # ── Extractor recipes ─────────────────────────────────────────────────────────
  # geological_input: the good_id drawn from planets.resource_deposits each tick.
  # inputs: [] — no goods-storage inputs; slot limit enforced by scheduler.
  # Output per tick = facility.config.max_rate × deposit.quality.

  - recipe_id: extract_iron
    product_id: iron
    factory_type: extractor
    geological_input: iron
    inputs: []
    base_yield: 1.0
    ticks: 1
    efficiency: 1.0

