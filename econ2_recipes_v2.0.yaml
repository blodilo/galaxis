  # ── Refinery recipes ──────────────────────────────────────────────────────────
  # Merges former smelter (metals) and refinery (chemicals/electronics) into one
  # factory type. Tier-2 processing — converts raw ore into usable materials.

  - recipe_id: refinery_steel
    product_id: steel
    factory_type: refinery
    inputs:
      - item_id: iron
        amount: 5.0
    base_yield: 5.0
    ticks: 1
    efficiency: 0.90

  - recipe_id: refinery_titansteel
    product_id: titansteel
    factory_type: refinery
    inputs:
      - item_id: iron
        amount: 3.0
      - item_id: titanium
        amount: 1.0
    base_yield: 3.0
    ticks: 1
    efficiency: 0.90

  - recipe_id: refinery_semiconductor_wafer
    product_id: semiconductor_wafer
    factory_type: refinery
    inputs:
      - item_id: silicon
        amount: 1.0
      - item_id: rare_earth
        amount: 1.0
    base_yield: 2.0
    ticks: 3
    efficiency: 0.85

  - recipe_id: refinery_fusion_fuel
    product_id: fusion_fuel
    factory_type: refinery
    inputs:
      - item_id: helium_3
        amount: 2.0
      - item_id: hydrogen
        amount: 3.0
    base_yield: 4.0
    ticks: 1
    efficiency: 0.92

  # ── Plant recipes ─────────────────────────────────────────────────────────────
  # Tier-3 production. Produces components and Tier-1/2 factory items.
  # Formerly precision_fab.

  - recipe_id: plant_base_component
    product_id: base_component
    factory_type: plant
    inputs:
      - item_id: titansteel
        amount: 2.0
      - item_id: semiconductor_wafer
        amount: 1.0
    base_yield: 3.0
    ticks: 4
    efficiency: 0.88

  - recipe_id: plant_nav_computer
    product_id: nav_computer
    factory_type: plant
    inputs:
      - item_id: semiconductor_wafer
        amount: 6.0
      - item_id: rare_earth
        amount: 2.0
    base_yield: 1.0
    ticks: 10
    efficiency: 0.85

  # Factory items produced by plant (Tier-1/2 facilities)
  # Inputs mirror the old construction recipes; ticks reduced since no BuildTickHandler overhead.

  - recipe_id: plant_fac_extractor_mk1
    product_id: fac_extractor_iron_mk1  # canonical item; deposit-specific variants share same cost
    factory_type: plant
    inputs:
      - item_id: steel
        amount: 10.0
      - item_id: base_component
        amount: 2.0
    base_yield: 1.0
    ticks: 3
    efficiency: 1.0

  - recipe_id: plant_fac_refinery_mk1
    product_id: fac_refinery_mk1
    factory_type: plant
    inputs:
      - item_id: titansteel
        amount: 15.0
      - item_id: semiconductor_wafer
        amount: 5.0
      - item_id: base_component
        amount: 8.0
    base_yield: 1.0
    ticks: 8
    efficiency: 1.0

  # ── Assembly Plant recipes ────────────────────────────────────────────────────
  # Tier-4 heavy assemblies. Inputs are Tier-2/3 materials and components.
  # Also produces Tier-3 factory items (fac_plant_mk1).

  - recipe_id: assembly_drive_unit
    product_id: drive_unit
    factory_type: assembly_plant
    inputs:
      - item_id: titansteel
        amount: 10.0
      - item_id: base_component
        amount: 5.0
      - item_id: fusion_fuel
        amount: 2.0
    base_yield: 1.0
    ticks: 20
    efficiency: 0.90  # [BALANCING]

  - recipe_id: assembly_reactor_module
    product_id: reactor_module
    factory_type: assembly_plant
    inputs:
      - item_id: titansteel
