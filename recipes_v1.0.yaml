      fusion_fuel: 5
      titansteel: 8
      semiconductor_wafer: 4
    outputs:
      fusion_reactor_lv1: 1

  - id: ion_thruster
    name: "Ionentriebwerk"
    facility_type: precision_factory
    tier: 3
    ticks: 8
    base_efficiency: 0.85
    inputs:
      fusion_fuel: 3
      titan_ore: 4
      semiconductor_wafer: 3
    outputs:
