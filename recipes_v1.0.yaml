# Galaxis — Produktionsrezepte
# Version: 1.0 · Datum: 2026-03-22
#
# Zweck: Alle Produktionsrezepte des Wirtschaftssystems.
# Wird beim Server-Start in-memory geladen (RecipeRegistry).
# Änderungen hier erfordern KEINE Datenbankmigrationen.
#
# Konvention:
#   - id: snake_case, eindeutig über alle Rezepte
#   - facility_type: smelter | refinery | bioreaktor | precision_factory | assembler | shipyard
#   - inputs/outputs: good_id → Menge in Einheiten (E)
#   - base_efficiency: η bei Level 1, ohne Forschungsbonus (0.0–1.0)
#   - ticks: Produktionsdauer in Strategie-Ticks (1 Tick = production_tick_minutes aus game-params)
#
# Stufen:
#   tier 1 = Rohstoffverarbeitung (Schmelze, Raffinerie)
#   tier 2 = Halbzeug
#   tier 3 = Komponenten (Präzisionsfabrik, orbital)
#   tier 4 = Endprodukte (Werft, Assembler)


# ═══════════════════════════════════════════════════════════════════
# STUFE 2 — HALBZEUG (Schmelze)
# ═══════════════════════════════════════════════════════════════════
recipes:

  - id: steel_basic
    name: "Stahl (Basis)"
    facility_type: smelter
    tier: 2
    ticks: 1
    base_efficiency: 0.90
    # [BALANCING] 5 E Eisenerz → 5 E Stahl, η=0,90 → 4,5 E akkumuliert
    inputs:
      iron_ore: 5
    outputs:
      steel: 5

  - id: titansteel
    name: "Titanstahl"
    facility_type: smelter
    tier: 2
    ticks: 1
    base_efficiency: 0.90
    # [BALANCING] Kernmaterial für Anlagenbau. 3 E Eisenerz + 1 E Titan → 3 E Titanstahl.
    # Vanadium/Chrom als optionale Qualitäts-Upgrades (spätere Rezept-Varianten).
    inputs:
      iron_ore: 3
      titan_ore: 1
    outputs:
      titansteel: 3

  - id: chrom_alloy
    name: "Chrom-Legierung"
    facility_type: smelter
    tier: 2
    ticks: 1
    base_efficiency: 0.88
    inputs:
      chrom: 2
      iron_ore: 1
    outputs:
      chrom_alloy: 2

  - id: keramik_komposit
    name: "Keramik-Komposit"
    facility_type: smelter
    tier: 2
    ticks: 2
    base_efficiency: 0.85
    inputs:
      silicates: 2
      chrom: 1
    outputs:
      keramik_komposit: 2

  - id: semiconductor_wafer
    name: "Halbleiter-Wafer"
    facility_type: refinery
    tier: 2
    ticks: 3
    base_efficiency: 0.85
    # [BALANCING] Schlüsselgut für Klasse-III-Produktion. Engpass-Ressource.
    # Seltene Erden sind Klasse II → Raffinerie braucht Sealed-Lager.
    inputs:
      silicates: 1
      rare_earths: 1
    outputs:
      semiconductor_wafer: 2

  - id: fusion_fuel
    name: "Fusionstreibstoff"
    facility_type: refinery
    tier: 2
    ticks: 1
    base_efficiency: 0.92
    inputs:
      helium3: 2
      hydrogen: 3
    outputs:
      fusion_fuel: 4

  - id: fissile_material
    name: "Spaltmaterial"
    facility_type: refinery
    tier: 2
    ticks: 4
    base_efficiency: 0.80
    # [BALANCING] Klasse IV — Raffinerie benötigt Segregated-Magazin.
    # Detonationsrisiko bei Falschlagerung (game-params: sensitivity.class_IV).
    inputs:
      uranium_raw: 2
    outputs:
      fissile_material: 1

  - id: biosynth_base
    name: "Biosynth-Grundstoff"
    facility_type: bioreaktor
    tier: 2
    ticks: 2
    base_efficiency: 0.82
    inputs:
      organics: 2
      water_ice: 1
    outputs:
      biosynth_base: 2

  - id: coolant
    name: "Kühlmittel"
    facility_type: refinery
    tier: 2
    ticks: 1
    base_efficiency: 0.90
    inputs:
      water_ice: 3
    outputs:
      coolant: 2


# ═══════════════════════════════════════════════════════════════════
# STUFE 3 — KOMPONENTEN (Präzisionsfabrik, nur orbital)
# ═══════════════════════════════════════════════════════════════════

  - id: base_component
    name: "Basiskomponente"
    facility_type: precision_factory
    tier: 3
    ticks: 4
    base_efficiency: 0.88
