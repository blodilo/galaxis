  - id: jump_drive
    name: "Sprung-Antrieb"
    facility_type: precision_factory
    tier: 3
    ticks: 24
    base_efficiency: 0.80
    # [BALANCING] Ermöglicht FTL-Navigation. Klasse III. Erfordert Fusionsreaktor als Input.
    inputs:
      fusion_reactor_lv1: 1
      fissile_material: 4
      rare_earths: 6
    outputs:
