    tier: 3
    ticks: 10
    base_efficiency: 0.83
    inputs:
      semiconductor_wafer: 6
      rare_earths: 4
      coolant: 3
    outputs:
      phase_shield: 1

  - id: life_support
    name: "Lebenserhaltung"
    facility_type: precision_factory
    tier: 3
    ticks: 8
    base_efficiency: 0.85
    inputs:
      biosynth_base: 4
      semiconductor_wafer: 3
      water_ice: 2
    outputs:
      life_support: 1

  - id: exotic_processor
    name: "Exotik-Prozessor"
    facility_type: precision_factory
    tier: 3
    ticks: 40
    base_efficiency: 0.75
    # [BALANCING] Hightech-Schlüsselkomponente. Sehr seltene Inputs. Klasse III.
    inputs:
      exotic_matter: 1
      semiconductor_wafer: 8
      platinum_group: 4
    outputs:
      exotic_processor: 1

  - id: kinetic_weapon
    name: "Waffensystem (kinetisch)"
    facility_type: precision_factory
    tier: 3
    ticks: 6
    base_efficiency: 0.88
    inputs:
      titansteel: 6
      semiconductor_wafer: 2
    outputs:
      kinetic_weapon: 1

  - id: energy_weapon
    name: "Waffensystem (Energie)"
    facility_type: precision_factory
    tier: 3
    ticks: 14
    base_efficiency: 0.82
    inputs:
      fissile_material: 2
      semiconductor_wafer: 8
      rare_earths: 2
    outputs:
      energy_weapon: 1


